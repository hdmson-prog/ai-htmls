<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" fill="#2c2416" rx="8"/>
  
  <!-- Candle flame (gold) -->
  <ellipse cx="32" cy="18" rx="5" ry="7" fill="#ffd700">
    <animate attributeName="ry" values="7;8;7" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;0.8;1" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Inner flame (lighter) -->
  <ellipse cx="32" cy="18" rx="3" ry="5" fill="#ffed4e">
    <animate attributeName="ry" values="5;6;5" dur="1.5s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- Wick -->
  <line x1="32" y1="22" x2="32" y2="28" stroke="#1a1613" stroke-width="0.5"/>
  
  <!-- Candle body (gradient) -->
  <defs>
    <linearGradient id="candleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e4d4b4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a86a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Candle -->
  <rect x="24" y="28" width="16" height="24" rx="1" fill="url(#candleGradient)"/>
  
  <!-- Candle top rim -->
  <ellipse cx="32" cy="28" rx="8" ry="2" fill="#c9a86a"/>
  
  <!-- Candle highlights -->
  <rect x="26" y="30" width="2" height="20" fill="#f5f1eb" opacity="0.3" rx="1"/>
  
  <!-- Bottom shadow -->
  <ellipse cx="32" cy="52" rx="10" ry="2" fill="#1a1613" opacity="0.3"/>
  
  <!-- Decorative sparkles -->
  <circle cx="20" cy="15" r="1" fill="#ffd700" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="44" cy="20" r="0.8" fill="#ffd700" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="25" r="0.6" fill="#c9a86a" opacity="0.5">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
